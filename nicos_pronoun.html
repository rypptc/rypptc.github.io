<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Polyglot Mandala Mockup</title>
    <meta name="description" content="Demo" />
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Montserrat:400,400i,700,700i,600,600i"
    />
    <link rel="stylesheet" href="assets/css/Footer-Clean.css" />
    <link rel="stylesheet" href="assets/css/Footer-Dark.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/baguettebox.js/1.10.0/baguetteBox.min.css"
    />
    <link rel="stylesheet" href="assets/css/smoothproducts.css" />

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const terms = ["ich", "du", "der", "wir", "sie", "was", "es", "wie", "er", "wo", "dir", "wer", "ihr", "ihnen", "man", "mir", "woher", "wie_viel", "mich", "wann", "aller", "dich", "uns", "warum", "alles", "wohin", "etwas", "jemand", "euch", "sich", "beide"];
        const freq = [106, 81, 81, 42, 34, 33, 28, 24, 20, 14, 10, 10, 9, 7, 6, 5, 5, 5, 4, 4, 4, 4, 3, 3, 3, 2, 2, 1, 1, 1, 1];

        for (let i = 0; i < terms.length; i++) {
          // Create a table row
          const tabBody = document.querySelector("#tableBody");
          const tabRow = document.createElement("tr");
          tabBody.appendChild(tabRow);

          //Create a table data
          const tabData1 = document.createElement("td");
          tabData1.classList.add("text-center");
          tabRow.appendChild(tabData1);
          const termText = document.createTextNode(terms[i]);
          tabData1.appendChild(termText);

          //Create a table data
          const tabData2 = document.createElement("td");
          tabData2.classList.add("text-center");
          tabRow.appendChild(tabData2);
          const termFreq = document.createTextNode(freq[i]);
          tabData2.appendChild(termFreq);
        }
      });
    </script>
  </head>

  <body>

          </div>
          <div class="row">

                  <thead>
                    <tr>
                      <th class="text-center">Lemma</th>
                      <th class="text-center">Frequency</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>
            </div>
            <div class="col-2"></div>

          <hr />
