<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var i = 0;
        function move() {
        if (i == 0) {
            i = 1;
            var elem = document.getElementById("myBar");
            var width = 1;
            var id = setInterval(frame, 10);
            function frame() {
            if (width >= 100) {
                clearInterval(id);
                i = 0;
            } else {
                width++;
                elem.style.width = width + "%";
            }
            }
        }
        }
    </script>
    <style>
        #myProgress {
        width: 100%;
        background-color: grey;
        }

        #myBar {
        width: 1%;
        height: 30px;
        background-color: green;
        }
    </style>
</head>
<body>
    <h1>Progress Bar</h1><br><br>
    <div id="myProgress">
        <div id="myBar"></div>
      </div>
</body>
</html>
