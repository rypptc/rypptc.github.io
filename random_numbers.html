<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <script>
        function getRandom() {
            d1 = parseInt(document.querySelector('#d1').value);
            d2 = parseInt(document.querySelector('#d2').value);
            random_result = Math.floor(Math.random() * (d2 - d1 + 1)) + d1;
            document.querySelector('#finalResult').innerHTML = random_result;
        };
        document.addEventListener('DOMContentLoaded', function() {

          document.querySelector('button').onclick = getRandom;
        });
    </script>
</head>
<body>
  <h1 class="text-center mt-5">Random Numbers</h1>
  <div class="container text-justify">
    <div class="row">
        <div class="col-4"></div>
        <div class="col text-center">
            <form>
      <input id="d1" class="form-control mt-3" type="number" placeholder="From" required="">
      <input id="d2" class="form-control mt-3" type="number" placeholder="To" required="">
      <button class="btn btn-primary mt-3" type="button">Random</button>
    </form>
    <h1 id="finalResult" type="text" class="mt-3"></div>
        <div class="col-4"></div>
    </div>
</div>
</body>
</html>
